receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 30s
    send_batch_size: 1024

exporters:
  otlphttp:
    endpoint: ${TELEMETRY_ENDPOINT}
    # TLS is default for port 443

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp]
