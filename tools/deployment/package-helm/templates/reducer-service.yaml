{{- if .Values.clpConfig.reducer }}
apiVersion: "v1"
kind: "Service"
metadata:
  name: {{ include "clp.fullname" . }}-reducer
  labels:
    {{- include "clp.labels" . | nindent 4 }}
    app.kubernetes.io/component: "reducer"
spec:
  clusterIP: "None"
  selector:
    {{- include "clp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: "reducer"
  ports:
    {{- $reducerConcurrency := .Values.scheduling.reducer.slotsPerPod | default .Values.workerConcurrency | int -}}
    {{- range $i := until $reducerConcurrency }}
    - name: "reducer-{{ $i }}"
      port: {{ add 14009 $i }}
    {{- end }}
{{- end }}
