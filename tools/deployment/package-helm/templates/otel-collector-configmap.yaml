{{- if and .Values.clpConfig.telemetry (not .Values.clpConfig.telemetry.disable) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clp.fullname" . }}-otel-collector-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          http:
            endpoint: "0.0.0.0:4318"

    processors:
      batch:
        timeout: "30s"
        send_batch_size: 1024
      resourcedetection:
        detectors: ["env", "system"]
        system:
          hostname_sources: ["os"]
          resource_attributes:
            host.arch:
              enabled: true
            host.cpu.family:
              enabled: true
            host.cpu.model.id:
              enabled: true
            host.cpu.vendor.id:
              enabled: true
        override: false

    exporters:
      otlphttp:
        endpoint: {{ .Values.clpConfig.telemetry.endpoint | quote }}

    service:
      pipelines:
        metrics:
          receivers: ["otlp"]
          processors: ["resourcedetection", "batch"]
          exporters: ["otlphttp"]
        traces:
          receivers: ["otlp"]
          processors: ["resourcedetection", "batch"]
          exporters: ["otlphttp"]
        logs:
          receivers: ["otlp"]
          processors: ["resourcedetection", "batch"]
          exporters: ["otlphttp"]
{{- end }}
