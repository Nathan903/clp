# nginx reverse proxy for the OTel Collector.
#
# Provides:
#   1. Payload size limit  (client_max_body_size) — prevents DoS via huge payloads
#   2. Per-IP rate limiting (limit_req_zone) — one misconfigured deployment
#      cannot flood the backend while others report normally

# 10 requests/second per IP, with a burst buffer of 30.
# A healthy CLP deployment exports metrics every 30s, so 1 request per 30s
# is normal.  10 r/s is already very generous — it allows a burst of
# reconnections without blocking legitimate traffic.
limit_req_zone $binary_remote_addr zone=perip:10m rate=10r/s;

upstream otel_collector {
    server otel-collector:4318;
}

server {
    listen 4318;

    # --- Payload size constraint ---
    # OTLP/HTTP batches are typically a few KB.  5 MB is generous;
    # anything larger is almost certainly a misconfigured client.
    client_max_body_size 5m;

    location / {
        limit_req zone=perip burst=30 nodelay;
        limit_req_status 429;

        proxy_pass http://otel_collector;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Return a clear JSON error for oversized payloads.
        proxy_intercept_errors on;
        error_page 413 = /413.json;
    }

    location = /413.json {
        default_type application/json;
        return 413 '{"error":"payload too large","max_size":"5MB"}';
    }
}
