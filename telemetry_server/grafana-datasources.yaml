# Grafana provisioning — auto-configures a ClickHouse data source.
apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    access: proxy
    url: http://clickhouse:8123
    isDefault: true
    editable: true
    jsonData:
      port: 8123
      protocol: http
      database: otel
      defaultDataSource: true
